name: Backend Spring Boot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend/spring-boot

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Ambientar PostgreSQL
        run: |
          docker compose up -d cinescope-database
          docker compose logs cinescope-database
          exit 1

      - name: Aguardar infraestrutura ficar saudável
        run: |
          echo "Aguardando o banco de dados PostgreSQL"
          until [ "$(docker inspect --format='{{.State.Health.Status}}' cinescope-database)" = "healthy"]; do
            sleep 3
          done
          echo "PostgreSQL ready"
      
      - name: Executar testes e build
        run: ./mvnw --batch-mode verify
      
      - name: Encerrar infraestrutura
        if: always()
        run: docker compose down -v

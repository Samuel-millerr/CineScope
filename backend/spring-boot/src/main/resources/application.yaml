server:
  port: 8000

spring:
  application:
    name: cinescope

  datasource:
    url: jdbc:postgresql://localhost:5432/cinescope
    username: postgres
    password: root

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format-sql: false

    flyway:
      enabled: true
      baseline-on-migrate: true

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}